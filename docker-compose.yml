# Local services for development. Production uses a managed Railway Postgres and a
# self-hosted Railway TEI service (see CLAUDE.md "Deployment"); this just gives
# `npm run dev` a database + embedding server to talk to. Start with
# `docker compose up -d`, then run the app from `app/`.
#
# The app reads (set these in app/.env.local):
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/genealogy
#   EMBEDDINGS_URL=http://localhost:8080   (omit it to run search lexical-only)
#   # Media object storage (the MinIO service below). In production these point at
#   # a Railway managed Bucket instead — same S3 API, see CLAUDE.md "Deployment".
#   STORAGE_ENDPOINT=localhost
#   STORAGE_PORT=9000
#   STORAGE_USE_SSL=false
#   STORAGE_ACCESS_KEY=minioadmin
#   STORAGE_SECRET_KEY=minioadmin
#   STORAGE_BUCKET=family-media   (auto-created on first use)

services:
  db:
    # pgvector image (not plain postgres:16-alpine) — search needs the `vector`
    # extension, which the migration enables. The existing genealogy-pgdata volume
    # is reused; only the image changes, so no data is lost.
    image: pgvector/pgvector:pg16
    container_name: genealogy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genealogy
    ports:
      - "5432:5432"
    volumes:
      - genealogy-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d genealogy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Open-source embedding server (Hugging Face Text Embeddings Inference, Apache-2.0).
  # Runs the model locally — no data leaves the machine. Optional: stop this service
  # (or unset EMBEDDINGS_URL) and search falls back to lexical-only.
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: genealogy-embeddings
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-small-en-v1.5"]
    ports:
      - "8080:80"
    volumes:
      - genealogy-tei-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for uploaded media (photos, certificates, PDFs).
  # The app talks to it via the `minio` client (lib/storage); the `family-media`
  # bucket is auto-created on first use. Console UI at http://localhost:9001.
  # Production swaps this for a Railway managed Bucket (same S3 API) — see CLAUDE.md.
  minio:
    image: minio/minio
    container_name: genealogy-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - genealogy-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  genealogy-pgdata:
  genealogy-tei-cache:
  genealogy-minio:
